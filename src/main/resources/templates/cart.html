<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ショッピングカート</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <!-- ナビゲーションヘッダー -->
    <nav class="navbar">
        <div class="navbar-content">
            <h1 class="navbar-title">ショッピングカート</h1>
            <button class="hamburger" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-menu" id="navMenu">
                <a th:href="@{/home}" class="nav-link">ホーム</a>
                <a th:href="@{/products}" class="nav-link">商品一覧</a>
                <a th:href="@{/cart}" class="nav-link active">カート</a>
                <form th:action="@{/logout}" method="post" class="nav-logout">
                    <button type="submit" class="nav-link">ログアウト</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- メインコンテンツ -->
    <div class="cart-container">
        <div th:if="${cart.isEmpty()}" class="card empty-cart">
            <p>カートに商品がありません。</p>
            <a th:href="@{/products}" class="btn primary">商品一覧へ</a>
        </div>

        <div th:if="${not cart.isEmpty()}">
            <!-- カート商品一覧 -->
            <div class="card cart-items">
                <h2>カート内の商品</h2>
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>商品名</th>
                            <th>単価</th>
                            <th>数量</th>
                            <th>小計</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart}">
                            <td th:text="${item.productName}">商品名</td>
                            <td class="price" th:text="${#numbers.formatInteger(item.price, 1)} + '円'">0円</td>
                            <td>
                                <form th:action="@{/cart/update}" method="post" class="quantity-form">
                                    <input type="hidden" name="productId" th:value="${item.productId}">
                                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="99" class="quantity-input">
                                    <button type="submit" class="btn small">更新</button>
                                </form>
                            </td>
                            <td class="price" th:text="${#numbers.formatInteger(item.subtotal, 1)} + '円'">0円</td>
                            <td>
                                <form th:action="@{/cart/remove}" method="post" class="inline-form">
                                    <input type="hidden" name="productId" th:value="${item.productId}">
                                    <button type="submit" class="btn small danger" onclick="return confirm('この商品をカートから削除しますか？')">削除</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 合計金額 -->
            <div class="card cart-summary">
                <div class="summary-row">
                    <span>小計:</span>
                    <span class="total" th:text="${#numbers.formatInteger(cartTotal, 1)} + '円'">0円</span>
                </div>
                <div class="summary-row">
                    <span>送料:</span>
                    <span>無料</span>
                </div>
                <hr>
                <div class="summary-row total-row">
                    <span>合計:</span>
                    <span class="total-price" th:text="${#numbers.formatInteger(cartTotal, 1)} + '円'">0円</span>
                </div>
                <button class="btn primary large" type="button">レジに進む</button>
                <a th:href="@{/products}" class="btn secondary">買い物を続ける</a>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/menu.js}"></script>
</body>
</html>
