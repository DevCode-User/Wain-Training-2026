<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規会員登録</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page center-page register-page">
    <div class="card login-card">
        <h1>新規会員登録</h1>
        <p class="description">設計書の customers テーブルに合わせて、利用者情報を登録する画面です。</p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post">
            <label for="loginId">ログインID</label>
            <input id="loginId" type="text" th:field="*{loginId}" placeholder="例: user002">
            <p class="field-error" th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}"></p>

            <label for="password">パスワード</label>
            <input id="password" type="password" th:field="*{password}" placeholder="8文字以上で入力">
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

            <label for="customerName">氏名</label>
            <input id="customerName" type="text" th:field="*{customerName}" placeholder="例: 山田 太郎">
            <p class="field-error" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></p>

            <label for="customerEmail">メールアドレス</label>
            <input id="customerEmail" type="email" th:field="*{customerEmail}" placeholder="例: user002@example.com">
            <p class="field-error" th:if="${#fields.hasErrors('customerEmail')}" th:errors="*{customerEmail}"></p>

            <label for="postalCode">郵便番号</label>
            <input id="postalCode" type="text" th:field="*{postalCode}" placeholder="例: 123-4567">
            <p class="field-error" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></p>

            <label for="addressLine1">住所1</label>
            <input id="addressLine1" type="text" th:field="*{addressLine1}" placeholder="例: 東京都千代田区1-1-1">
            <p class="field-error" th:if="${#fields.hasErrors('addressLine1')}" th:errors="*{addressLine1}"></p>

            <label for="addressLine2">住所2</label>
            <input id="addressLine2" type="text" th:field="*{addressLine2}" placeholder="建物名・部屋番号（任意）">
            <p class="field-error" th:if="${#fields.hasErrors('addressLine2')}" th:errors="*{addressLine2}"></p>

            <label for="phone">電話番号</label>
            <input id="phone" type="text" th:field="*{phone}" placeholder="例: 090-1111-2222">
            <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>

            <p class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

            <div class="button-group">
                <button class="btn primary" type="submit">登録する</button>
                <a class="btn secondary" th:href="@{/login}">ログインへ戻る</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
