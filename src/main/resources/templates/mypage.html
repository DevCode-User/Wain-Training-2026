<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <!-- ナビゲーションヘッダー -->
    <nav class="navbar">
        <div class="navbar-content">
            <h1 class="navbar-title">マイページ</h1>
            <button class="hamburger" id="hamburgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-menu" id="navMenu">
                <a th:href="@{/home}" class="nav-link">ホーム</a>
                <a th:href="@{/products}" class="nav-link">商品一覧</a>
                <a th:href="@{/cart}" class="nav-link">カート</a>
                <a th:href="@{/mypage}" class="nav-link active">マイページ</a>
                <form th:action="@{/logout}" method="post" class="nav-logout">
                    <button type="submit" class="nav-link">ログアウト</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- マイページコンテンツ -->
    <div class="mypage-container">
        <div class="card user-welcome">
            <h1>マイページ</h1>
            <p class="welcome-msg" th:text="${'いつもご利用ありがとうございます、' + userName + ' さん'}">ようこそ</p>
        </div>

        <div class="card order-history">
            <h2>注文履歴</h2>

            <div th:if="${orders.isEmpty()}" class="empty-state">
                <p>注文履歴がありません。</p>
                <a th:href="@{/products}" class="btn primary">買い物を始める</a>
            </div>

            <div th:if="${not orders.isEmpty()}" class="orders-list">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>注文番号</th>
                            <th>注文日時</th>
                            <th>合計金額</th>
                            <th>ステータス</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.orderId}">123</td>
                            <td class="date" th:text="${#temporals.format(order.orderDate, 'yyyy年MM月dd日')}">2026年04月10日</td>
                            <td class="amount" th:text="${#numbers.formatInteger(order.totalAmount, 1)} + '円'">0円</td>
                            <td>
                                <span class="status-badge" th:classappend="${order.orderStatus == 'PENDING' ? 'pending' : order.orderStatus == 'COMPLETED' ? 'completed' : 'cancelled'}" th:text="${order.orderStatus == 'PENDING' ? '処理中' : order.orderStatus == 'COMPLETED' ? '完了' : 'キャンセル'}">ステータス</span>
                            </td>
                            <td>
                                <a th:href="@{/mypage/order/{id}(id=${order.orderId})}" class="btn small">詳細を見る</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/menu.js}"></script>
</body>
</html>
