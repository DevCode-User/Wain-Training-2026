<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>在庫管理</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div class="page"><nav class="navbar"><div class="navbar-content"><h1 class="navbar-title">在庫管理</h1><div class="nav-menu always-open"><a th:href="@{/admin/home}" class="nav-link">ダッシュボード</a><a th:href="@{/admin/products}" class="nav-link">商品管理</a><a th:href="@{/admin/stocks}" class="nav-link active">在庫管理</a><a th:href="@{/admin/orders}" class="nav-link">注文管理</a><form th:action="@{/logout}" method="post" class="nav-logout"><button type="submit" class="nav-link">ログアウト</button></form></div></div></nav><div class="admin-container"><div th:if="${successMessage}" class="alert alert-success"><p th:text="${successMessage}"></p></div><div th:if="${errorMessage}" class="alert alert-error"><p th:text="${errorMessage}"></p></div><div class="card"><h3>CSVアップロード（product_id,stock）</h3><form th:action="@{/admin/stocks/upload}" method="post" enctype="multipart/form-data" class="inline-form"><input type="file" name="file" accept=".csv" required><button class="btn secondary" type="submit">CSV反映</button></form></div><form th:action="@{/admin/stocks/bulk-update}" method="post" class="card"><table class="admin-table"><thead><tr><th>ID</th><th>商品名</th><th>現在在庫</th><th>更新在庫</th></tr></thead><tbody><tr th:each="product : ${products}"><td><span th:text="${product.productId}">1</span><input type="hidden" name="productId" th:value="${product.productId}"></td><td th:text="${product.productName}">商品名</td><td th:text="${product.stock}">10</td><td><input type="number" min="0" name="stock" th:value="${product.stock}"></td></tr></tbody></table><div class="button-group"><button class="btn primary" type="submit">在庫を一括更新</button></div></form></div></div></body></html>
