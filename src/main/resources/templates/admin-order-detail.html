<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>注文管理詳細</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div class="page"><nav class="navbar"><div class="navbar-content"><h1 class="navbar-title">注文管理詳細</h1><div class="nav-menu always-open"><a th:href="@{/admin/home}" class="nav-link">ダッシュボード</a><a th:href="@{/admin/products}" class="nav-link">商品管理</a><a th:href="@{/admin/stocks}" class="nav-link">在庫管理</a><a th:href="@{/admin/orders}" class="nav-link active">注文管理</a><form th:action="@{/logout}" method="post" class="nav-logout"><button type="submit" class="nav-link">ログアウト</button></form></div></div></nav><div class="admin-container"><div th:if="${successMessage}" class="alert alert-success"><p th:text="${successMessage}"></p></div><div class="card"><h2>注文情報</h2><p>注文ID: <strong th:text="${order.orderId}">1</strong></p><p>顧客ID: <strong th:text="${order.customerId}">1</strong></p><p>注文日時: <strong th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd HH:mm:ss')}">2026/04/14 10:00:00</strong></p><p>配送先: <strong th:text="${order.shippingAddress}">東京都...</strong></p><p>支払方法: <strong th:text="${order.paymentMethod}">credit_card</strong></p><form th:action="@{/admin/orders/{id}/status(id=${order.orderId})}" method="post" class="inline-form"><label for="orderStatus">注文状態</label><select id="orderStatus" name="orderStatus"><option value="RECEIVED" th:selected="${order.orderStatus == 'RECEIVED'}">受付</option><option value="PREPARING" th:selected="${order.orderStatus == 'PREPARING'}">発送準備中</option><option value="SHIPPED" th:selected="${order.orderStatus == 'SHIPPED'}">発送済</option><option value="CANCELLED" th:selected="${order.orderStatus == 'CANCELLED'}">キャンセル</option></select><button class="btn primary" type="submit">状態更新</button></form></div><div class="card"><h3>注文明細</h3><table class="admin-table"><thead><tr><th>商品名</th><th>数量</th><th>単価</th><th>小計</th></tr></thead><tbody><tr th:each="item : ${orderItems}"><td th:text="${item.productName}">商品名</td><td th:text="${item.quantity}">1</td><td th:text="${#numbers.formatInteger(item.unitPrice, 1)} + '円'">0円</td><td th:text="${#numbers.formatInteger(item.subtotal, 1)} + '円'">0円</td></tr></tbody></table></div><div class="button-group"><a th:href="@{/admin/orders}" class="btn secondary">注文一覧へ戻る</a></div></div></div></body></html>
