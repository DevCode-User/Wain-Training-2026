<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle}">商品登録</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div class="page center-page register-page"><div class="card login-card"><h1 th:text="${pageTitle}">商品登録</h1><p class="description">設計書のC画面「商品管理画面」に対応しています。</p><p class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></p><form th:action="@{/admin/products/save}" th:object="${productForm}" method="post"><input type="hidden" th:field="*{productId}"><label for="categoryId">カテゴリ</label><select id="categoryId" th:field="*{categoryId}"><option value="">選択してください</option><option th:each="category : ${categories}" th:value="${category.categoryId}" th:text="${category.categoryName}"></option></select><p class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></p><label for="productName">商品名</label><input id="productName" type="text" th:field="*{productName}"><p class="field-error" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></p><label for="description">商品説明</label><textarea id="description" th:field="*{description}" rows="5"></textarea><p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p><label for="price">価格</label><input id="price" type="number" min="0" th:field="*{price}"><p class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p><label for="stock">在庫数</label><input id="stock" type="number" min="0" th:field="*{stock}"><p class="field-error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></p><label for="imageUrl">画像URL</label><input id="imageUrl" type="text" th:field="*{imageUrl}"><label for="size">サイズ</label><input id="size" type="text" th:field="*{size}"><label for="weight">重量</label><input id="weight" type="text" th:field="*{weight}"><label for="origin">原産地</label><input id="origin" type="text" th:field="*{origin}"><label class="checkbox-row"><input type="checkbox" th:field="*{isActive}">表示する</label><div class="button-group"><button class="btn primary" type="submit">保存</button><a th:href="@{/admin/products}" class="btn secondary">戻る</a></div></form></div></div></body></html>
