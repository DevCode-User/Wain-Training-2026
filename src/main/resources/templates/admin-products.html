<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>商品管理</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div class="page"><nav class="navbar"><div class="navbar-content"><h1 class="navbar-title">商品管理</h1><div class="nav-menu always-open"><a th:href="@{/admin/home}" class="nav-link">ダッシュボード</a><a th:href="@{/admin/products}" class="nav-link active">商品管理</a><a th:href="@{/admin/stocks}" class="nav-link">在庫管理</a><a th:href="@{/admin/orders}" class="nav-link">注文管理</a><form th:action="@{/logout}" method="post" class="nav-logout"><button type="submit" class="nav-link">ログアウト</button></form></div></div></nav><div class="admin-container"><div th:if="${successMessage}" class="alert alert-success"><p th:text="${successMessage}"></p></div><div th:if="${errorMessage}" class="alert alert-error"><p th:text="${errorMessage}"></p></div><div class="card toolbar-card"><a th:href="@{/admin/products/new}" class="btn primary">新規商品登録</a></div><div class="card"><table class="admin-table"><thead><tr><th>ID</th><th>カテゴリ</th><th>商品名</th><th>価格</th><th>在庫</th><th>表示</th><th>操作</th></tr></thead><tbody><tr th:each="product : ${products}"><td th:text="${product.productId}">1</td><td th:text="${product.categoryName}">カテゴリ</td><td th:text="${product.productName}">商品</td><td th:text="${#numbers.formatInteger(product.price, 1)} + '円'">0円</td><td th:text="${product.stock}">0</td><td th:text="${product.isActive ? '表示中' : '非表示'}">表示中</td><td class="action-cell"><a th:href="@{/admin/products/{id}/edit(id=${product.productId})}" class="btn small">編集</a><form th:action="@{/admin/products/{id}/delete(id=${product.productId})}" method="post"><button class="btn danger small" type="submit">非表示</button></form></td></tr></tbody></table></div></div></div></body></html>
