<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム - 商品サイト</title>
    <link rel="stylesheet" href="../common/css/style.css">
    <style>
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        
        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .hero button {
            background: white;
            color: #667eea;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .hero button:hover {
            transform: translateY(-2px);
        }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }
        
        .product-image {
            background: #f0f0f0;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }
        
        .product-info {
            padding: 15px;
        }
        
        .product-info h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        .product-info p {
            color: #666;
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        
        .product-price {
            font-size: 20px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .product-info button {
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>ショップ</h1>
            <nav>
                <ul>
                    <li><a href="/">ホーム</a></li>
                    <li><a href="/order">注文履歴</a></li>
                    <li><a href="/login" style="color: #667eea;">ログイン</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <main>
        <div class="hero">
            <h1>ようこそ</h1>
            <p>質の高い商品を手に入れましょう</p>
            <button onclick="document.querySelector('main .container').scrollIntoView({behavior: 'smooth'})">商品を見る</button>
        </div>
        
        <div class="container">
            <h2>おすすめ商品</h2>
            
            <div class="products" id="productsGrid">
                <!-- 商品がここに動的に生成されます -->
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">
                    商品を読み込み中...
                </div>
            </div>
        </div>
    </main>
    
    <footer style="background: #333; color: white; text-align: center; padding: 20px; margin-top: 40px;">
        <p>&copy; 2026 Shop. All rights reserved.</p>
    </footer>
    
    <script src="../customer/js/index.js"></script>
</body>
</html>
