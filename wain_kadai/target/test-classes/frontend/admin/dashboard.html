<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード - 管理画面</title>
    <link rel="stylesheet" href="../common/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>管理画面</h1>
            <nav>
                <ul>
                    <li><a href="/dashboard">ダッシュボード</a></li>
                    <li><a href="/stock">在庫管理</a></li>
                    <li><a href="/orders">注文管理</a></li>
                    <li><a href="/logout" style="color: #d32f2f;">ログアウト</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <main>
        <div class="container">
            <h2>ダッシュボード</h2>
            <p id="greeting">ようこそ</p>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
                <!-- カード1: 注文統計 -->
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <h3>今月の注文</h3>
                    <p style="font-size: 32px; color: #667eea; margin: 10px 0; font-weight: bold;">--</p>
                    <p style="color: #999; margin: 0;">件数</p>
                </div>
                
                <!-- カード2: 売上 -->
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <h3>今月の売上</h3>
                    <p style="font-size: 32px; color: #4caf50; margin: 10px 0; font-weight: bold;">¥--</p>
                    <p style="color: #999; margin: 0;">総額</p>
                </div>
                
                <!-- カード3: 在庫 -->
                <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <h3>在庫数</h3>
                    <p style="font-size: 32px; color: #ff9800; margin: 10px 0; font-weight: bold;">--</p>
                    <p style="color: #999; margin: 0;">商品</p>
                </div>
            </div>
            
            <!-- 最近の注文テーブル -->
            <div style="margin-top: 40px;">
                <h3>最近の注文</h3>
                <table>
                    <thead>
                        <tr>
                            <th>注文ID</th>
                            <th>顧客名</th>
                            <th>金額</th>
                            <th>日時</th>
                            <th>ステータス</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 20px; color: #999;">
                                データが読み込み中です...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <footer style="background: #333; color: white; text-align: center; padding: 20px; margin-top: 40px;">
        <p>&copy; 2026 Admin System. All rights reserved.</p>
    </footer>
    
    <script src="../admin/js/dashboard.js"></script>
</body>
</html>
