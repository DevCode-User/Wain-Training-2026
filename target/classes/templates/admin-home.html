<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>管理ダッシュボード</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div class="page"><nav class="navbar"><div class="navbar-content"><h1 class="navbar-title">管理ダッシュボード</h1><div class="nav-menu always-open"><a th:href="@{/admin/home}" class="nav-link active">ダッシュボード</a><a th:href="@{/admin/products}" class="nav-link">商品管理</a><a th:href="@{/admin/stocks}" class="nav-link">在庫管理</a><a th:href="@{/admin/orders}" class="nav-link">注文管理</a><form th:action="@{/logout}" method="post" class="nav-logout"><button type="submit" class="nav-link">ログアウト</button></form></div></div></nav><div class="admin-container"><div class="card"><h2>ようこそ、<span th:text="${userName}">管理者</span> さん</h2><p class="description">設計書のB画面「ダッシュボード」に対応する管理トップです。</p></div><div class="stats-grid"><div class="card stat-card"><p class="stat-label">商品数</p><p class="stat-value" th:text="${dashboard.productCount}">0</p></div><div class="card stat-card"><p class="stat-label">公開中商品</p><p class="stat-value" th:text="${dashboard.activeProductCount}">0</p></div><div class="card stat-card"><p class="stat-label">在庫切れ商品</p><p class="stat-value" th:text="${dashboard.zeroStockCount}">0</p></div><div class="card stat-card"><p class="stat-label">注文数</p><p class="stat-value" th:text="${dashboard.orderCount}">0</p></div></div><div class="card"><h3>最近の注文</h3><table class="admin-table"><thead><tr><th>注文ID</th><th>日時</th><th>状態</th><th>詳細</th></tr></thead><tbody><tr th:each="order : ${dashboard.recentOrders}"><td th:text="${order.orderId}">1</td><td th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd HH:mm')}">2026/04/14 10:00</td><td th:text="${order.orderStatusLabel}">受付</td><td><a th:href="@{/admin/orders/{id}(id=${order.orderId})}" class="btn small">見る</a></td></tr><tr th:if="${#lists.isEmpty(dashboard.recentOrders)}"><td colspan="4">注文はまだありません。</td></tr></tbody></table></div></div></div></body></html>
