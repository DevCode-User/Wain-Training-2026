<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>注文管理</title><link rel="stylesheet" th:href="@{/css/style.css}"></head><body><div class="page"><nav class="navbar"><div class="navbar-content"><h1 class="navbar-title">注文管理</h1><div class="nav-menu always-open"><a th:href="@{/admin/home}" class="nav-link">ダッシュボード</a><a th:href="@{/admin/products}" class="nav-link">商品管理</a><a th:href="@{/admin/stocks}" class="nav-link">在庫管理</a><a th:href="@{/admin/orders}" class="nav-link active">注文管理</a><form th:action="@{/logout}" method="post" class="nav-logout"><button type="submit" class="nav-link">ログアウト</button></form></div></div></nav><div class="admin-container"><div class="card"><table class="admin-table"><thead><tr><th>注文ID</th><th>顧客ID</th><th>注文日時</th><th>合計金額</th><th>状態</th><th>詳細</th></tr></thead><tbody><tr th:each="order : ${orders}"><td th:text="${order.orderId}">1</td><td th:text="${order.customerId}">1</td><td th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd HH:mm')}">2026/04/14 10:00</td><td th:text="${#numbers.formatInteger(order.totalAmount, 1)} + '円'">0円</td><td th:text="${order.orderStatusLabel}">受付</td><td><a th:href="@{/admin/orders/{id}(id=${order.orderId})}" class="btn small">詳細</a></td></tr><tr th:if="${#lists.isEmpty(orders)}"><td colspan="6">注文はありません。</td></tr></tbody></table></div></div></div></body></html>
