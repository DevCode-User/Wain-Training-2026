<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>商品一覧</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><div class="page">
<nav class="navbar"><div class="navbar-content"><h1 class="navbar-title">商品一覧</h1><button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button><div class="nav-menu" id="navMenu"><a th:href="@{/home}" class="nav-link">ホーム</a><a th:href="@{/products}" class="nav-link active">商品一覧</a><a th:href="@{/cart}" class="nav-link">カート</a><a th:href="@{/mypage}" class="nav-link">マイページ</a><form th:action="@{/logout}" method="post" class="nav-logout"><button type="submit" class="nav-link">ログアウト</button></form></div></div></nav>
<div class="main-content"><aside class="sidebar"><div class="card search-card"><h3>キーワード検索</h3><form th:action="@{/products}" method="get" class="search-form"><input type="text" name="keyword" th:value="${searchKeyword}" placeholder="商品名で検索..."><button class="btn primary" type="submit">検索</button></form></div><div class="card filter-card"><h3>価格で検索</h3><form th:action="@{/products}" method="get" class="search-form"><label for="minPrice">最低価格</label><input id="minPrice" type="number" name="minPrice" min="0" th:value="${minPrice}"><label for="maxPrice">最大価格</label><input id="maxPrice" type="number" name="maxPrice" min="0" th:value="${maxPrice}"><button class="btn primary" type="submit">検索</button></form></div><div class="card filter-card"><h3>カテゴリから探す</h3><div class="category-list"><a th:href="@{/products}" class="category-link" th:classappend="${selectedCategory == null ? ' active' : ''}">すべて表示</a><th:block th:each="cat : ${categories}"><a th:href="@{/products(category=${cat})}" class="category-link" th:classappend="${selectedCategory == cat ? ' active' : ''}" th:text="${cat}">カテゴリ</a></th:block></div></div></aside>
<main class="product-grid-container"><div th:if="${successMessage}" class="alert alert-success"><p th:text="${successMessage}"></p></div><div th:if="${errorMessage}" class="alert alert-error"><p th:text="${errorMessage}"></p></div><div th:if="${products.isEmpty()}" class="card no-products"><p>商品が見つかりません。</p><a th:href="@{/products}" class="btn secondary">すべての商品を表示</a></div><div th:if="${not products.isEmpty()}" class="product-grid"><div th:each="product : ${products}" class="card product-card"><div class="product-image"><div class="image-placeholder">[[${product.categoryName}]]</div></div><h3 th:text="${product.productName}">商品名</h3><p class="category" th:text="${product.categoryName}">カテゴリ</p><p class="description" th:text="${product.description}">商品説明</p><div class="product-info"><div class="price"><span class="price-value" th:text="${#numbers.formatInteger(product.price, 1)}">0</span><span class="price-unit">円</span></div><div class="stock" th:class="${product.stock > 0 ? 'stock in-stock' : 'stock out-of-stock'}"><span th:if="${product.stock > 0}" th:text="${'在庫: ' + product.stock}">在庫あり</span><span th:if="${product.stock <= 0}">在庫なし</span></div></div><div class="button-group vertical compact"><a th:href="@{/products/{id}(id=${product.productId})}" class="btn secondary">詳細を見る</a><form th:action="@{/cart/add}" method="post" class="add-to-cart-form"><input type="hidden" name="productId" th:value="${product.productId}"><input type="hidden" name="quantity" value="1"><button class="btn primary" th:disabled="${product.stock <= 0}" type="submit"><span th:if="${product.stock > 0}">カートに追加</span><span th:if="${product.stock <= 0}">在庫なし</span></button></form></div></div></div></main></div></div><script th:src="@{/js/menu.js}"></script></body></html>
