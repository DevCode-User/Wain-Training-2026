<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利用者ログイン</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page center-page">
    <div class="card login-card">
        <h1>利用者ログイン</h1>
        <p class="description">customers テーブルの login_id と password を照合します。</p>

        <p class="form-success" th:if="${successMessage}" th:text="${successMessage}"></p>

        <form th:action="@{/login}" th:object="${loginForm}" method="post">
            <label for="loginId">ログインID</label>
            <input id="loginId" type="text" th:field="*{loginId}" placeholder="例: user001">
            <p class="field-error" th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}"></p>

            <label for="password">パスワード</label>
            <input id="password" type="password" th:field="*{password}" placeholder="パスワードを入力">
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

            <p class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

            <div class="button-group">
                <button class="btn primary" type="submit">ログイン</button>
                <a class="btn secondary" th:href="@{/}">戻る</a>
            </div>
        </form>

        <div class="sub-links">
            <a th:href="@{/register}">新規会員登録はこちら</a>
        </div>
    </div>
</div>
</body>
</html>
